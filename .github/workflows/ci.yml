name: CI (docker compose)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

env:
  IMAGE: akp1n/catdog-api
  APP_PORT: "8001"

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create runtime secret files
        shell: bash
        run: |
          mkdir -p secrets

          printf "%s" "${{ secrets.REDIS_HOST_INTERNAL }}" > secrets/redis_host.txt
          printf "%s" "${{ secrets.REDIS_PORT_INTERNAL }}" > secrets/redis_port.txt
          printf "%s" "${{ secrets.REDIS_DB_INDEX }}" > secrets/redis_db.txt
          printf "%s" "${{ secrets.REDIS_APP_USERNAME }}" > secrets/redis_username.txt
          printf "%s" "${{ secrets.REDIS_APP_PASSWORD }}" > secrets/redis_password.txt

          echo "::add-mask::${{ secrets.REDIS_APP_PASSWORD }}"
          echo "::add-mask::${{ secrets.REDIS_APP_USERNAME }}"
          echo "::add-mask::${{ secrets.REDIS_HOST_INTERNAL }}"
          echo "::add-mask::${{ secrets.REDIS_PORT_INTERNAL }}"
          echo "::add-mask::${{ secrets.REDIS_DB_INDEX }}"

          cat > secrets/redis_users.acl <<EOF
          user default off
          user ${{ secrets.REDIS_APP_USERNAME }} on >${{ secrets.REDIS_APP_PASSWORD }} ~prediction:* ~predictions:* +ping +hset +hgetall +zadd +zrevrange +multi +exec +select +client
          EOF

          chmod 600 secrets/redis_*

      - name: Build image (compose)
        run: docker compose build --progress=plain

      - name: Run stack
        run: docker compose up -d --wait --remove-orphans

      - name: Show status
        run: |
          docker compose ps
          docker compose logs --no-color --tail 300

      - name: Smoke test API docs
        run: |
          curl -fsS "http://localhost:${APP_PORT}/docs" > /dev/null

      - name: Stop container
        if: always()
        run: |
          docker compose down -v --remove-orphans
          rm -rf secrets

  push-image:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (latest + commit tag)
        run: |
          docker build -t $IMAGE:latest -t $IMAGE:${{ github.sha }} .
          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}